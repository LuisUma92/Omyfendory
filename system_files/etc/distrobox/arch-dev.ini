[arch-dev]
image=docker.io/library/archlinux:latest
pull=true
replace=true
nvidia=false
entry=true
exported_bins="/usr/bin/yay"
additional_packages="base-devel git clang llvm gcc-fortran cmake nodejs npm rust python python-pip python-poetry ruby luarocks graphviz tree-sitter-cli texlive-basic texlive-latexextra"
init_hooks="command -v yay || (git clone https://aur.archlinux.org/yay-bin.git /tmp/yay-bin && cd /tmp/yay-bin && makepkg -si --noconfirm && rm -rf /tmp/yay-bin)"
